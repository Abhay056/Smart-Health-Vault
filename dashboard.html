<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-fontawesome-key.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: cadetblue;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            padding-top: 70px;
        }

        .navbar {
            display: flex;
            width: 100%;
            background-color: #07398f;
            padding: 15px;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000; /* Ensures navbar stays on top */
        }

        .navbar a img {
            height: 50px;
        }

        .navlinks {
            display: flex;
            gap: 20px;
        }

        .navlinks a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 15px;
            transition: 0.3s;
        }

        .navlinks a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        /* Heading */
        .heading {
            text-align: center;
            margin: 20px 0;
            color: #07398f;
        }

        /* Dashboard Container */
        .container {
            background: #222831;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: #2e3440;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            background: #3b4252;
        }

        .card i {
            font-size: 22px;
            color: #FF6B6B;
        }

        .card span {
            flex: 1;
            margin-left: 10px;
            font-size: 16px;
        }

        .dots {
            display: flex;
            gap: 5px;
        }

        .dots span {
            width: 8px;
            height: 8px;
            background: gray;
            border-radius: 50%;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .add-btn, .recent-btn {
            background: #00ADB5;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .recent-btn {
            background: #008CBA;
        }

        .add-btn:hover, .recent-btn:hover {
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                display: flex;
                padding: 0;
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .navlinks {
                flex-direction: column;
            }

            .grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html"><img src="logo.png" alt="Health Vault"></a>
        <div class="navlinks">
            <a href="index.html">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="insights.html">Insights</a>
        </div>
    </div>

    <div class="heading">
        <h1>Welcome, <span id="userName">Name</span> to Smart Health Vault</h1> 
    </div>

    <div class="container">
        <h2>Biomarkers</h2>
        <div class="grid">
            <div class="card">
                <i class="fas fa-heartbeat"></i>
                <span>Heart</span>
                <div class="dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-procedures"></i>
                <span>Kidney</span>
                <div class="dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-disease"></i>
                <span>Liver</span>
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-capsules"></i>
                <span>Sugar</span>
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-tint"></i>
                <span>Blood</span>
                <div class="dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-dna"></i>
                <span>Thyroid</span>
                <div class="dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <i class="fas fa-venus-mars"></i>
                <span>Reproductive</span>
                <div class="dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button class="add-btn">+ Add Result</button>
            <button class="recent-btn">Recent Tests →</button>
        </div>
    </div>
</body>
</html>
